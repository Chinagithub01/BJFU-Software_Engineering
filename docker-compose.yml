name: peerreview

# PostgreSQL 镜像：默认走 AWS ECR 公共库（与 Dockerfile.backend 一致），避免 Docker Hub TLS 证书问题
# MinIO 默认 DaoCloud 镜像（quay.io 旧 RELEASE 标签已下线；勿用 docker.m.daocloud.io/... 会 403）
# 可覆盖：MINIO_IMAGE / MINIO_MC_IMAGE

services:
  db:
    image: ${POSTGRES_IMAGE:-public.ecr.aws/docker/library/postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: peerreview
      POSTGRES_USER: peerreview
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-PeerReview@2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peerreview -d peerreview"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  db-init:
    image: ${POSTGRES_IMAGE:-public.ecr.aws/docker/library/postgres:16-alpine}
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: peerreview
      PGUSER: peerreview
      PGPASSWORD: ${POSTGRES_PASSWORD:-PeerReview@2026}
    volumes:
      - ./sql:/sql:ro
      - ./docker/init-db.sh:/init-db.sh:ro
    entrypoint: ["/bin/sh", "-c", "sed 's/\\r$//' /init-db.sh | sh"]
    restart: "no"

  minio:
    image: ${MINIO_IMAGE:-m.daocloud.io/docker.io/minio/minio:latest}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  minio-init:
    image: ${MINIO_MC_IMAGE:-m.daocloud.io/docker.io/minio/mc:latest}
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-peerreview-uploads}
    volumes:
      - ./docker/init-minio.sh:/init-minio.sh:ro
    entrypoint: ["/bin/sh", "-c", "sed 's/\\r$//' /init-minio.sh | sh"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    depends_on:
      db-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      JDBC_URL: jdbc:postgresql://db:5432/peerreview
      JDBC_USERNAME: peerreview
      JDBC_PASSWORD: ${POSTGRES_PASSWORD:-PeerReview@2026}
      UPLOADS_DIR: /data/uploads
      JWT_SECRET: ${JWT_SECRET:-PeerReview-JWT-Secret-32Bytes!!}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-peerreview-uploads}
    volumes:
      - uploads_data:/data/uploads
    expose:
      - "8080"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:80"

volumes:
  postgres_data:
  uploads_data:
  minio_data:
